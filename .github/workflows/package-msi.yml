name: Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: package-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  windows-package:
    name: build msi
    runs-on: windows-latest
    env:
      OCCLUVIEW_SIGN_CERT_SHA1: ${{ secrets.OCCLUVIEW_SIGN_CERT_SHA1 }}
      OCCLUVIEW_SIGN_PFX_PASSWORD: ${{ secrets.OCCLUVIEW_SIGN_PFX_PASSWORD }}
      OCCLUVIEW_SIGN_TIMESTAMP_URL: ${{ vars.OCCLUVIEW_SIGN_TIMESTAMP_URL }}
      OCCLUVIEW_HPS_EMBEDDED_KEY: ${{ secrets.OCCLUVIEW_HPS_EMBEDDED_KEY }}
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2.9.1
      - name: Check release tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $cargoText = Get-Content ./Cargo.toml -Raw
          $match = [regex]::Match($cargoText, '(?s)\[workspace\.package\].*?version\s*=\s*"([^"]+)"')
          if (-not $match.Success) { throw "Could not find workspace package version." }
          $expectedTag = "v$($match.Groups[1].Value)"
          if ($env:GITHUB_REF_NAME -ne $expectedTag) {
            throw "Release tag '$env:GITHUB_REF_NAME' does not match Cargo version '$expectedTag'."
          }
      - name: Install WiX Toolset
        shell: pwsh
        run: choco install wixtoolset --yes --no-progress
      - name: Prepare signing certificate
        shell: pwsh
        env:
          OCCLUVIEW_SIGN_PFX_BASE64: ${{ secrets.OCCLUVIEW_SIGN_PFX_BASE64 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:OCCLUVIEW_SIGN_PFX_BASE64)) {
            Write-Host "No PFX signing certificate configured."
            exit 0
          }
          $pfxPath = Join-Path $env:RUNNER_TEMP "occluview-signing.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:OCCLUVIEW_SIGN_PFX_BASE64))
          "OCCLUVIEW_SIGN_PFX_PATH=$pfxPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
      - name: Verify embedded HPS key build path
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:OCCLUVIEW_HPS_EMBEDDED_KEY)) {
            throw "OCCLUVIEW_HPS_EMBEDDED_KEY is required for Package MSI so encrypted HPS files work in the shipped installer."
          }
          git grep --quiet --fixed-strings -e "$env:OCCLUVIEW_HPS_EMBEDDED_KEY" --
          $sourceExit = $LASTEXITCODE
          if ($sourceExit -eq 0) {
            throw "Embedded HPS key material must not appear in tracked source."
          }
          if ($sourceExit -gt 1) {
            throw "Could not scan tracked source for embedded HPS key material."
          }

          $testLog = Join-Path $env:RUNNER_TEMP "occluview-hps-provider-test.log"
          cargo test -p occluview-hps --features private-hps-key key::tests::runtime_provider_reads_generated_embedded_key_when_present -- --nocapture *> $testLog
          $testExit = $LASTEXITCODE
          if (Select-String -Path $testLog -SimpleMatch -Pattern $env:OCCLUVIEW_HPS_EMBEDDED_KEY -Quiet) {
            Remove-Item -LiteralPath $testLog -Force
            throw "Embedded HPS key material appeared in provider test logs."
          }
          Get-Content -LiteralPath $testLog
          Remove-Item -LiteralPath $testLog -Force
          if ($testExit -ne 0) {
            throw "Leaf HPS runtime-provider test failed with exit code $testExit."
          }
      - name: Build MSI
        shell: pwsh
        run: ./install/build-msi.ps1 -SignMode auto
      - name: Build portable ZIP
        shell: pwsh
        run: |
          $cargoText = Get-Content ./Cargo.toml -Raw
          $match = [regex]::Match($cargoText, '(?s)\[workspace\.package\].*?version\s*=\s*"([^"]+)"')
          if (-not $match.Success) { throw "Could not find workspace package version." }
          $version = $match.Groups[1].Value
          $target = "x86_64-pc-windows-msvc"
          $buildDir = Join-Path $pwd "target\$target\release"
          $portableRoot = Join-Path $env:RUNNER_TEMP "OccluView"
          $portableDir = Join-Path $portableRoot "OccluView"
          Remove-Item $portableRoot -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $portableDir -Force | Out-Null
          Copy-Item (Join-Path $buildDir "occluview.exe") $portableDir
          Copy-Item (Join-Path $buildDir "occluview_shell.dll") $portableDir
          Copy-Item ./LICENSE $portableDir
          Copy-Item ./NOTICE $portableDir
          Copy-Item ./README.md $portableDir
          Compress-Archive -Path $portableDir -DestinationPath "./dist/OccluView-$version-$target-portable.zip" -CompressionLevel Optimal -Force
      - name: Build upgrade smoke MSI
        shell: pwsh
        run: |
          $cargoText = Get-Content ./Cargo.toml -Raw
          $match = [regex]::Match($cargoText, '(?s)\[workspace\.package\].*?version\s*=\s*"([^"]+)"')
          if (-not $match.Success) { throw "Could not find workspace package version." }
          $version = [version]$match.Groups[1].Value
          $upgradeVersion = "{0}.{1}.{2}" -f $version.Major, $version.Minor, ($version.Build + 1)
          $smokeDir = Join-Path $env:RUNNER_TEMP "occluview-msi-upgrade"
          ./install/build-msi.ps1 -Version $upgradeVersion -OutputDir $smokeDir -SkipBuild -SignMode auto
      - name: Smoke install and uninstall
        shell: pwsh
        run: |
          $releaseMsi = Get-ChildItem ./dist -Filter *.msi | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          $upgradeMsi = Get-ChildItem (Join-Path $env:RUNNER_TEMP "occluview-msi-upgrade") -Filter *.msi | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          ./install/test-msi-lifecycle.ps1 -MsiPath $releaseMsi.FullName -UpgradeMsiPath $upgradeMsi.FullName
      - name: Write Windows checksums
        shell: pwsh
        run: |
          Get-ChildItem ./dist -File | Where-Object { $_.Name -match '\.(msi|zip)$' } | ForEach-Object {
            $hash = Get-FileHash -Algorithm SHA256 $_.FullName
            "$($hash.Hash.ToLowerInvariant())  $($_.Name)" | Set-Content -Encoding ascii "$($_.FullName).sha256"
          }
      - uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: occluview-windows-package
          retention-days: 14
          path: |
            dist/*.msi
            dist/*.zip
            dist/*.sha256

  linux-package:
    name: build linux deb
    runs-on: ubuntu-latest
    env:
      OCCLUVIEW_HPS_EMBEDDED_KEY: ${{ secrets.OCCLUVIEW_HPS_EMBEDDED_KEY }}
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2.9.1
      - name: Check release tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          version="$(awk '
            $0 == "[workspace.package]" { in_section = 1; next }
            /^\[/ && in_section { exit }
            in_section && $1 == "version" {
              gsub(/"/, "", $3)
              print $3
              exit
            }
          ' Cargo.toml)"
          test -n "$version"
          expected_tag="v$version"
          if [[ "$GITHUB_REF_NAME" != "$expected_tag" ]]; then
            echo "Release tag '$GITHUB_REF_NAME' does not match Cargo version '$expected_tag'." >&2
            exit 1
          fi
      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y appstream desktop-file-utils libxml2-utils shared-mime-info lintian
      - name: Verify embedded HPS key build path
        run: |
          if [[ -z "${OCCLUVIEW_HPS_EMBEDDED_KEY:-}" ]]; then
            echo "OCCLUVIEW_HPS_EMBEDDED_KEY is required for Package Linux so encrypted HPS files work in the shipped package." >&2
            exit 1
          fi
          set +e
          git grep --quiet --fixed-strings -e "$OCCLUVIEW_HPS_EMBEDDED_KEY" --
          source_status=$?
          set -e
          if [[ "$source_status" -eq 0 ]]; then
            echo "Embedded HPS key material must not appear in tracked source." >&2
            exit 1
          fi
          if [[ "$source_status" -gt 1 ]]; then
            echo "Could not scan tracked source for embedded HPS key material." >&2
            exit 1
          fi

          test_log="$(mktemp)"
          set +e
          cargo test -p occluview-hps --features private-hps-key key::tests::runtime_provider_reads_generated_embedded_key_when_present -- --nocapture >"$test_log" 2>&1
          test_status=$?
          set -e
          if printf '%s\n' "$OCCLUVIEW_HPS_EMBEDDED_KEY" | grep -Fq -f - "$test_log"; then
            rm -f "$test_log"
            echo "Embedded HPS key material appeared in provider test logs." >&2
            exit 1
          fi
          cat "$test_log"
          rm -f "$test_log"
          if [[ "$test_status" -ne 0 ]]; then
            echo "Leaf HPS runtime-provider test failed with exit code $test_status." >&2
            exit "$test_status"
          fi
      - name: Build Debian package
        run: install/linux/build-deb.sh
      - name: Validate Debian package
        run: |
          desktop-file-validate install/linux/ai.occlutrace.OccluView.desktop
          appstreamcli validate --no-net install/linux/ai.occlutrace.OccluView.metainfo.xml
          xmllint --noout install/linux/occluview-mime.xml install/linux/ai.occlutrace.OccluView.metainfo.xml
          dpkg-deb --info target/deb/*.deb
          dpkg-deb --contents target/deb/*.deb
          install/linux/check-deb.sh target/deb/*.deb
      - name: Write Linux checksums
        run: |
          for deb in target/deb/*.deb; do
            (cd "$(dirname "$deb")" && sha256sum "$(basename "$deb")" > "$(basename "$deb").sha256")
          done
      - uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: occluview-linux-package
          retention-days: 14
          path: |
            target/deb/*.deb
            target/deb/*.sha256

  publish:
    name: publish github release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - windows-package
      - linux-package
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          path: dist
          merge-multiple: true
      - name: Write release notes
        run: |
          cat > dist/release-notes.md <<NOTES
          OccluView $GITHUB_REF_NAME

          Assets:
          - MSI installer: installs the Windows viewer, Explorer thumbnails, live Preview Pane handler, file associations, and the shared 3D file icon.
          - Portable ZIP: manual Windows launch only; it does not install Explorer thumbnails or file associations.
          - Debian package: installs the native Linux viewer, freedesktop launcher, MIME registration, icon, and thumbnailer.

          Refer to the changelog and repository history for included changes.
          NOTES
      - name: Sign update artifacts and write latest.json
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          # The in-app updater trusts ONLY minisign-signed artifacts; a release
          # without signatures would be invisible to installed clients, so fail
          # loudly instead of shipping one.
          if [[ -z "$MINISIGN_SECRET_KEY" ]]; then
            echo "MINISIGN_SECRET_KEY secret is not configured." >&2
            exit 1
          fi
          sudo apt-get update -q && sudo apt-get install -qy minisign
          umask 077
          printf '%s\n' "$MINISIGN_SECRET_KEY" > /tmp/minisign.key

          tag="$GITHUB_REF_NAME"
          version="${tag#v}"
          msi=$(find ./dist -type f -name '*.msi' | head -n1)
          zip=$(find ./dist -type f -name '*.zip' | head -n1)
          deb=$(find ./dist -type f -name '*.deb' | head -n1)
          if [[ -z "$msi" || -z "$zip" || -z "$deb" ]]; then
            echo "Missing release artifact (msi='$msi' zip='$zip' deb='$deb')." >&2
            exit 1
          fi

          sign_and_hash() {
            local file="$1"
            minisign -S -s /tmp/minisign.key -m "$file"
            sha256sum "$file" | cut -d' ' -f1
          }
          msi_sha=$(sign_and_hash "$msi")
          msi_name=$(basename "$msi")
          zip_sha=$(sign_and_hash "$zip")
          zip_name=$(basename "$zip")
          deb_sha=$(sign_and_hash "$deb")
          deb_name=$(basename "$deb")
          echo "Signed portable ZIP $zip_name ($zip_sha)"

          python3 - "$version" "$tag" \
            "$msi_name" "$msi_sha" "$msi.minisig" \
            "$deb_name" "$deb_sha" "$deb.minisig" <<'PY'
          import json, sys
          version, tag, msi_name, msi_sha, msi_sig, deb_name, deb_sha, deb_sig = sys.argv[1:9]
          release_url = f"https://github.com/occlutrace/OccluView/releases/download/{tag}"
          manifest = {
              "version": version,
              "notes": f"OccluView {tag} — see the GitHub release for details.",
              "platforms": {
                  "windows-x86_64": {
                      "url": f"{release_url}/{msi_name}",
                      "signature": open(msi_sig, encoding="utf-8").read(),
                      "sha256": msi_sha,
                  },
                  "linux-x86_64": {
                      "url": f"{release_url}/{deb_name}",
                      "signature": open(deb_sig, encoding="utf-8").read(),
                      "sha256": deb_sha,
                  },
              },
          }
          with open("dist/latest.json", "w", encoding="utf-8") as handle:
              json.dump(manifest, handle, indent=2)
          PY
          minisign -S -s /tmp/minisign.key -m dist/latest.json
          rm -f /tmp/minisign.key
          echo "Update manifest:" && cat dist/latest.json

      - name: Publish GitHub Release
        run: |
          tag="$GITHUB_REF_NAME"
          version="${tag#v}"
          release_flags=()
          # 0.x releases are REAL releases, not GitHub prereleases: the in-app
          # updater and the connector's bundled-install both resolve
          # releases/latest/download/latest.json, and GitHub excludes
          # prereleases from /latest (it would 404 until a 1.0 tag).
          mapfile -d '' assets < <(find ./dist -type f \( -name '*.msi' -o -name '*.zip' -o -name '*.deb' -o -name '*.sha256' -o -name '*.minisig' -o -name 'latest.json' \) -print0 | sort -z)
          if [[ "${#assets[@]}" -eq 0 ]]; then
            echo "No release assets found." >&2
            exit 1
          fi
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$tag" --repo "$GITHUB_REPOSITORY" --title "OccluView $tag" --notes-file "./dist/release-notes.md" "${release_flags[@]}"
            gh release upload "$tag" --repo "$GITHUB_REPOSITORY" "${assets[@]}" --clobber
          else
            gh release create "$tag" --repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" "${assets[@]}" --title "OccluView $tag" --notes-file "./dist/release-notes.md" "${release_flags[@]}"
          fi
