# clippy configuration — numeric limits from AGENTS.md §3.
# Enforced in CI: `cargo clippy --workspace --all-targets -- -D warnings`.

# Cognitive complexity per function (AGENTS.md §3 limit: 15).
cognitive-complexity-threshold = 15

# Max function arguments (AGENTS.md §3 limit: 5).
too-many-arguments-threshold = 5

# Max number of lines in a function body (AGENTS.md §3 limit: 60).
# Clippy's `too_many_lines` default is 100; we tighten to 60.
# NOTE: file-length (500) is enforced by a separate custom CI check, not clippy.

# Enum variant size: warn on large variants (helps keep types cache-friendly).
enum-variant-size-threshold = 256

# Prefer MSRV-aware lints. Matches rust-toolchain.toml.
msrv = "1.81"

# Allow certain words in identifiers that clippy's `doc_markdown` flags
# incorrectly for our domain.
doc-valid-idents = [
    "OccluView",
    "OccluTrace",
    "WebGPU",
    "OpenXR",
    "Win32",
    "Direct3D",
    "D3D11",
    "D3D12",
    "WARP",
    "..",
]

# Disallow empty loops (catches `loop {}` busy-waits).
empty-loop = "warn"

# Type complexity threshold (default 250 — tighten to keep signatures readable).
type-complexity-threshold = 200
